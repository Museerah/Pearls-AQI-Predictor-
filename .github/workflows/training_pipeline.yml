name: Training Pipeline - Daily

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  run-training-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-pipeline.txt

      - name: Configure DVC remote (DagsHub)
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          dvc remote add -f -d dagshub "https://dagshub.com/${DAGSHUB_USERNAME}/${DAGSHUB_REPO}.dvc"
          dvc remote modify dagshub auth basic
          dvc remote modify --local dagshub user "${DAGSHUB_USERNAME}"
          dvc remote modify --local dagshub password "${DAGSHUB_TOKEN}"

      - name: Pull latest features from DVC storage
        run: dvc pull data/features.parquet.dvc

      - name: Run training pipeline
        env:
          CITY: ${{ secrets.CITY }}
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: python -m src.training_pipeline
