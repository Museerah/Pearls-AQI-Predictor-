name: Feature Pipeline - Hourly

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-feature-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-pipeline.txt

      - name: Run feature pipeline
        env:
          CITY: ${{ secrets.CITY }}
        run: python -m src.feature_pipeline

      - name: Configure DVC remote (DagsHub)
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          dvc remote add -f -d dagshub "https://dagshub.com/${DAGSHUB_USERNAME}/${DAGSHUB_REPO}.dvc"
          dvc remote modify dagshub auth basic
          dvc remote modify --local dagshub user "${DAGSHUB_USERNAME}"
          dvc remote modify --local dagshub password "${DAGSHUB_TOKEN}"

      - name: Track and push features with DVC
        run: |
          dvc add data/features.parquet
          dvc push data/features.parquet.dvc

      - name: Commit lightweight DVC metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add data/features.parquet.dvc .dvc/config .gitignore
          git diff --staged --quiet || git commit -m "chore: update DVC feature metadata"
          git push
